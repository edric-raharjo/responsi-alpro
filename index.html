<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Python Questions</title>
    <style>
        :root {
            color-scheme: light;
            background: #f7efe4;
            color: #40362f;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #f7efe4 0%, #efe2d4 100%);
        }

        .page-shell {
            max-width: 1080px;
            margin: 0 auto;
            padding: 32px 20px 56px;
        }

        header {
            margin-bottom: 32px;
            padding: 28px 32px;
            border-radius: 24px;
            background: #f1c27d;
            border: 1px solid rgba(166, 104, 26, 0.18);
            box-shadow: 0 24px 80px rgba(166, 104, 26, 0.16);
        }

        header h1 {
            margin: 0;
            font-size: clamp(2rem, 2.7vw, 3rem);
            line-height: 1.05;
            letter-spacing: -0.03em;
            color: #3f2b11;
        }

        header p {
            display: none;
        }

        .questions-grid {
            display: grid;
            gap: 24px;
        }

        .question-card {
            padding: 24px;
            border-radius: 24px;
            background: #facd93;
            border: 1px solid rgba(194, 113, 31, 0.2);
            box-shadow: 0 20px 70px rgba(167, 95, 23, 0.15);
        }

        .question-card h2 {
            margin: 0 0 14px;
            font-size: 1.55rem;
            color: #442c10;
        }

        .question-card p,
        .question-card li {
            color: #40362f;
            line-height: 1.8;
        }

        .question-card p {
            margin: 0 0 18px;
            white-space: pre-wrap;
        }

        .question-card ul {
            margin: 0;
            padding-left: 24px;
            list-style: disc;
        }

        .question-card li {
            margin-bottom: 12px;
        }

        .question-card strong {
            color: #7dd3fc;
        }

        .question-card .label {
            display: inline-block;
            padding: 4px 10px;
            margin-bottom: 14px;
            border-radius: 999px;
            background: rgba(217, 115, 24, 0.16);
            color: #933d08;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .question-card .example-label {
            margin-top: 10px;
            margin-bottom: 12px;
            color: #8a4508;
            font-weight: 700;
        }

        .error-banner {
            margin-top: 20px;
            padding: 16px 20px;
            border-radius: 18px;
            background: rgba(248, 113, 113, 0.14);
            border: 1px solid rgba(248, 113, 113, 0.22);
            color: #fee2e2;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        @media (max-width: 680px) {
            .page-shell {
                padding: 24px 16px 40px;
            }

            .question-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header>
            <h1>Practice Python Questions</h1>
            <p>Explore 10 LeetCode problem descriptions with examples in a clean, Claude-inspired interface. If the local JSON cannot be loaded, the fallback content still renders immediately.</p>
        </header>

        <div id="questions" class="questions-grid"></div>
        <div class="footer">Open this page in a browser or serve it with a local static server for the best experience.</div>
    </div>

    <script>
        const fallbackQuestions = {
            questions: [
                {
                    id: 1,
                    title: "Two Sum",
                    question: "Given an array of integers nums and an integer target, return indices of the two numbers such that they add up to target.\n\nYou may assume that each input would have exactly one solution, and you may not use the same element twice.\n\nYou can return the answer in any order.",
                    examples: [
                        {input: "nums = [2,7,11,15], target = 9", output: "[0,1]"},
                        {input: "nums = [3,2,4], target = 6", output: "[1,2]"},
                        {input: "nums = [3,3], target = 6", output: "[0,1]"}
                    ]
                },
                {
                    id: 2,
                    title: "Palindrome Number",
                    question: "Given an integer x, return true if x is a palindrome, and false otherwise.",
                    examples: [
                        {input: "x = 121", output: "true"},
                        {input: "x = -121", output: "false"},
                        {input: "x = 10", output: "false"}
                    ]
                },
                {
                    id: 3,
                    title: "Roman to Integer",
                    question: "Roman numerals are represented by seven different symbols: I, V, X, L, C, D and M.\n\nSymbol       Value\nI             1\nV             5\nX             10\nL             50\nC             100\nD             500\nM             1000\n\nFor example, 2 is written as II in Roman numeral, just two one's added together. 12 is written as XII, which is simply X + II. The number 27 is written as XXVII, which is XX + V + II.\n\nRoman numerals are usually written largest to smallest from left to right. However, the numeral for four is not IIII. Instead, the number four is written as IV. Because the one is before the five we subtract it making four. The same principle applies to the number nine, which is written as IX. There are six instances where subtraction is used:\n\nI can be placed before V (5) and X (10) to make 4 and 9.\nX can be placed before L (50) and C (100) to make 40 and 90.\nC can be placed before D (500) and M (1000) to make 400 and 900.\n\nGiven a roman numeral, convert it to an integer.",
                    examples: [
                        {input: "s = \"III\"", output: "3"},
                        {input: "s = \"IV\"", output: "4"},
                        {input: "s = \"IX\"", output: "9"},
                        {input: "s = \"LVIII\"", output: "58"}
                    ]
                },
                {
                    id: 4,
                    title: "Longest Common Prefix",
                    question: "Write a function to find the longest common prefix string amongst an array of strings.\n\nIf there is no common prefix, return an empty string \"\".",
                    examples: [
                        {input: "strs = [\"flower\",\"flow\",\"flight\"]", output: "\"fl\""},
                        {input: "strs = [\"dog\",\"racecar\",\"car\"]", output: "\"\""},
                        {input: "strs = [\"a\"]", output: "\"a\""}
                    ]
                },
                {
                    id: 5,
                    title: "Merge two sorted lists",
                    question: "You are given the heads of two sorted linked lists list1 and list2.\n\nMerge the two lists into one sorted list. The list should be made by splicing together the nodes of the first two lists.\n\nReturn the head of the merged linked list.",
                    examples: [
                        {input: "list1 = [1,2,4], list2 = [1,3,4]", output: "[1,1,2,3,4,4]"},
                        {input: "list1 = [], list2 = []", output: "[]"},
                        {input: "list1 = [], list2 = [0]", output: "[0]"}
                    ]
                },
                {
                    id: 6,
                    title: "Valid Parentheses",
                    question: "Given a string s containing just the characters '(', ')', '{', '}', '[' and ']', determine if the input string is valid.\n\nAn input string is valid if:\n\nOpen brackets must be closed by the same type of brackets.\nOpen brackets must be closed in the correct order.\nEvery close bracket has a corresponding open bracket of the same type.",
                    examples: [
                        {input: "s = \"()\"", output: "true"},
                        {input: "s = \"()[]{}\"", output: "true"},
                        {input: "s = \"(]\"", output: "false"},
                        {input: "s = \"([)]\"", output: "false"}
                    ]
                },
                {
                    id: 7,
                    title: "Length of Last Word",
                    question: "Given a string s consisting of words and spaces, return the length of the last word in the string.\n\nA word is a maximal substring consisting of non-space characters only.",
                    examples: [
                        {input: "s = \"Hello World\"", output: "5"},
                        {input: "s = \"   fly me   to   the moon  \"", output: "4"},
                        {input: "s = \"luffy is still joyboy\"", output: "6"}
                    ]
                },
                {
                    id: 8,
                    title: "String to Integer (atoi)",
                    question: "Implement the myAtoi(string s) function, which converts a string to a 32-bit signed integer (similar to C/C++'s atoi function).\n\nThe algorithm for myAtoi(string s) is as follows:\n\nRead in and ignore any leading whitespace.\nCheck if the next character (if not already at the end of the string) is '-' or '+'. Read this character in if it is either. This determines if the final result is negative or positive respectively. Assume the result is positive if neither is present.\nRead in next the characters until the next non-digit character or the end of the string is reached. The rest of the string is ignored.\nConvert these digits into an integer (i.e. \"123\" -> 123, \"0032\" -> 32). If no digits were read, then the integer is 0. Change the sign as necessary (from step 2).\nIf the integer is out of the 32-bit signed integer range [-231, 231 - 1], then clamp the integer so that it remains in the range. Specifically, integers less than -231 should be clamped to -231, and integers greater than 231 - 1 should be clamped to 231 - 1.\nReturn the integer as the final result.\n\nNote:\n\nOnly the space character ' ' is considered a whitespace character.\nDo not ignore any characters other than the leading whitespace or the rest of the string after the digits.",
                    examples: [
                        {input: "s = \"42\"", output: "42"},
                        {input: "s = \"   -42\"", output: "-42"},
                        {input: "s = \"4193 with words\"", output: "4193"},
                        {input: "s = \"words and 987\"", output: "0"}
                    ]
                },
                {
                    id: 9,
                    title: "Add two numbers",
                    question: "You are given two non-empty linked lists representing two non-negative integers. The digits are stored in reverse order, and each of their nodes contains a single digit. Add the two numbers and return the sum as a linked list.\n\nYou may assume the two numbers do not contain any leading zero, except the number 0 itself.",
                    examples: [
                        {input: "l1 = [2,4,3], l2 = [5,6,4]", output: "[7,0,8]"},
                        {input: "l1 = [0], l2 = [0]", output: "[0]"},
                        {input: "l1 = [9,9,9,9,9,9,9], l2 = [9,9,9,9]", output: "[8,9,9,9,0,0,0,1]"}
                    ]
                },
                {
                    id: 10,
                    title: "4Sum",
                    question: "Given an array nums of n integers, return an array of all the unique quadruplets [nums[a], nums[b], nums[c], nums[d]] such that:\n\n0 <= a, b, c, d < n\na, b, c, d are distinct.\nnums[a] + nums[b] + nums[c] + nums[d] == target\n\nYou may return the answer in any order.",
                    examples: [
                        {input: "nums = [1,0,-1,0,-2,2], target = 0", output: "[[-2,-1,1,2],[-2,0,0,2],[-1,0,0,1]]"},
                        {input: "nums = [2,2,2,2,2], target = 8", output: "[[2,2,2,2]]"},
                        {input: "nums = [], target = 0", output: "[]"}
                    ]
                }
            ]
        };

        function renderQuestions(data) {
            const container = document.getElementById('questions');
            container.innerHTML = '';

            data.questions.forEach(q => {
                const card = document.createElement('article');
                card.className = 'question-card';

                const title = document.createElement('h2');
                title.textContent = `${q.id}. ${q.title}`;
                card.appendChild(title);

                const description = document.createElement('p');
                description.innerHTML = q.question.replace(/\n/g, '<br>');
                card.appendChild(description);

                if (q.examples && q.examples.length) {
                    const exampleTitle = document.createElement('div');
                    exampleTitle.className = 'example-label';
                    exampleTitle.textContent = 'Examples';
                    card.appendChild(exampleTitle);

                    const list = document.createElement('ul');
                    q.examples.forEach(ex => {
                        const item = document.createElement('li');
                        item.innerHTML = `<span class="label">Input</span> ${ex.input}<br><span class="label">Output</span> ${ex.output}`;
                        list.appendChild(item);
                    });
                    card.appendChild(list);
                }

                container.appendChild(card);
            });
        }

        function loadQuestions() {
            renderQuestions(fallbackQuestions);
        }

        loadQuestions();
    </script>
</body>
</html>
