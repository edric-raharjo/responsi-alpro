<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Python Questions</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f4ef;
            --surface: #ffffff;
            --surface-strong: #faf8f4;
            --text: #2f2b28;
            --muted: #6f6a65;
            --border: rgba(47, 43, 40, 0.12);
            --accent: #d97b32;
            --accent-soft: rgba(217, 123, 50, 0.12);
            --shadow: 0 24px 64px rgba(45, 40, 34, 0.08);
            --header: #ffffff;
            --header-border: rgba(47, 43, 40, 0.08);
            font-family: 'Poppins', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        }

        .dark {
            --bg: #11151b;
            --surface: #141b23;
            --surface-strong: #19232f;
            --text: #f4f5f7;
            --muted: #a1a8b4;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #f59e0b;
            --accent-soft: rgba(245, 158, 11, 0.16);
            --shadow: 0 24px 64px rgba(0, 0, 0, 0.24);
            --header: #1f2937;
            --header-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
        }

        body,
        button {
            font: 100%/1.6 system-ui, sans-serif;
        }

        .page-shell {
            max-width: 920px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 32px;
            padding: 28px 28px 24px;
            border-radius: 28px;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .hero-title {
            margin: 0;
            font-size: clamp(2.25rem, 3.5vw, 3.4rem);
            line-height: 1.02;
        }

        .theme-toggle {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 999px;
            padding: 12px 18px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
        }

        .questions-list {
            display: grid;
            gap: 20px;
        }

        .accordion {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .accordion summary {
            list-style: none;
            cursor: pointer;
            padding: 22px 26px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            color: var(--text);
            font-size: 1.15rem;
            font-weight: 700;
            transition: background 0.2s ease;
        }

        .accordion summary::-webkit-details-marker {
            display: none;
        }

        .accordion summary::after {
            content: '\25bc';
            transition: transform 0.2s ease;
            color: var(--muted);
            font-size: 1rem;
        }

        .accordion[open] summary::after {
            transform: rotate(180deg);
        }

        .accordion summary:hover {
            background: var(--accent-soft);
        }

        .accordion-content {
            padding: 18px 26px 26px;
            color: var(--text);
            border-top: 1px solid var(--border);
            margin-top: -1px;
        }

        .question-description {
            margin: 0 0 18px;
            color: var(--muted);
            white-space: pre-wrap;
        }

        .example-block {
            padding: 18px;
            background: var(--surface-strong);
            border-radius: 18px;
            border: 1px solid var(--border);
        }

        .example-block h3 {
            margin: 0 0 14px;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .example-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 12px;
        }

        .example-item {
            padding: 14px 16px;
            border-radius: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .example-item strong {
            display: inline-block;
            width: 68px;
            color: var(--accent);
            font-weight: 700;
        }

        .footer {
            margin-top: 36px;
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
        }

        @media (max-width: 720px) {
            .page-shell {
                padding: 24px 16px 40px;
            }

            header {
                flex-direction: column;
                align-items: stretch;
            }

            .theme-toggle {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header>
            <h1 class="hero-title">Practice Python Questions</h1>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">Dark mode</button>
        </header>

        <div id="questions" class="questions-list"></div>
        <div class="footer">Open this page in a browser or serve it with a local static server for the best experience.</div>
    </div>

    <script>
        const fallbackQuestions = {
            questions: [
                {
                    id: 1,
                    title: "Two Sum",
                    question: "Given an array of integers nums and an integer target, return indices of the two numbers such that they add up to target.\n\nYou may assume that each input would have exactly one solution, and you may not use the same element twice.\n\nYou can return the answer in any order.",
                    examples: [
                        {input: "nums = [2,7,11,15], target = 9", output: "[0,1]"},
                        {input: "nums = [3,2,4], target = 6", output: "[1,2]"},
                        {input: "nums = [3,3], target = 6", output: "[0,1]"}
                    ]
                },
                {
                    id: 2,
                    title: "Palindrome Number",
                    question: "Given an integer x, return true if x is a palindrome, and false otherwise.",
                    examples: [
                        {input: "x = 121", output: "true"},
                        {input: "x = -121", output: "false"},
                        {input: "x = 10", output: "false"}
                    ]
                },
                {
                    id: 3,
                    title: "Roman to Integer",
                    question: "Roman numerals are represented by seven different symbols: I, V, X, L, C, D and M.\n\nSymbol       Value\nI             1\nV             5\nX             10\nL             50\nC             100\nD             500\nM             1000\n\nFor example, 2 is written as II in Roman numeral, just two one's added together. 12 is written as XII, which is simply X + II. The number 27 is written as XXVII, which is XX + V + II.\n\nRoman numerals are usually written largest to smallest from left to right. However, the numeral for four is not IIII. Instead, the number four is written as IV. Because the one is before the five we subtract it making four. The same principle applies to the number nine, which is written as IX. There are six instances where subtraction is used:\n\nI can be placed before V (5) and X (10) to make 4 and 9.\nX can be placed before L (50) and C (100) to make 40 and 90.\nC can be placed before D (500) and M (1000) to make 400 and 900.\n\nGiven a roman numeral, convert it to an integer.",
                    examples: [
                        {input: "s = \"III\"", output: "3"},
                        {input: "s = \"IV\"", output: "4"},
                        {input: "s = \"IX\"", output: "9"},
                        {input: "s = \"LVIII\"", output: "58"}
                    ]
                },
                {
                    id: 4,
                    title: "Longest Common Prefix",
                    question: "Write a function to find the longest common prefix string amongst an array of strings.\n\nIf there is no common prefix, return an empty string \"\".",
                    examples: [
                        {input: "strs = [\"flower\",\"flow\",\"flight\"]", output: "\"fl\""},
                        {input: "strs = [\"dog\",\"racecar\",\"car\"]", output: "\"\""},
                        {input: "strs = [\"a\"]", output: "\"a\""}
                    ]
                },
                {
                    id: 5,
                    title: "Merge two sorted lists",
                    question: "You are given the heads of two sorted linked lists list1 and list2.\n\nMerge the two lists into one sorted list. The list should be made by splicing together the nodes of the first two lists.\n\nReturn the head of the merged linked list.",
                    examples: [
                        {input: "list1 = [1,2,4], list2 = [1,3,4]", output: "[1,1,2,3,4,4]"},
                        {input: "list1 = [], list2 = []", output: "[]"},
                        {input: "list1 = [], list2 = [0]", output: "[0]"}
                    ]
                },
                {
                    id: 6,
                    title: "Valid Parentheses",
                    question: "Given a string s containing just the characters '(', ')', '{', '}', '[' and ']', determine if the input string is valid.\n\nAn input string is valid if:\n\nOpen brackets must be closed by the same type of brackets.\nOpen brackets must be closed in the correct order.\nEvery close bracket has a corresponding open bracket of the same type.",
                    examples: [
                        {input: "s = \"()\"", output: "true"},
                        {input: "s = \"()[]{}\"", output: "true"},
                        {input: "s = \"(]\"", output: "false"},
                        {input: "s = \"([)]\"", output: "false"}
                    ]
                },
                {
                    id: 7,
                    title: "Length of Last Word",
                    question: "Given a string s consisting of words and spaces, return the length of the last word in the string.\n\nA word is a maximal substring consisting of non-space characters only.",
                    examples: [
                        {input: "s = \"Hello World\"", output: "5"},
                        {input: "s = \"   fly me   to   the moon  \"", output: "4"},
                        {input: "s = \"luffy is still joyboy\"", output: "6"}
                    ]
                },
                {
                    id: 8,
                    title: "Maximum Subarray",
                    question: "Given an integer array nums, find the contiguous subarray with the largest sum, and return its sum.",
                    examples: [
                        {input: "nums = [-2,1,-3,4,-1,2,1,-5,4]", output: "6"},
                        {input: "nums = [1]", output: "1"},
                        {input: "nums = [5,4,-1,7,8]", output: "23"}
                    ]
                },
                {
                    id: 9,
                    title: "Add two numbers",
                    question: "You are given two non-empty linked lists representing two non-negative integers. The digits are stored in reverse order, and each of their nodes contains a single digit. Add the two numbers and return the sum as a linked list.\n\nYou may assume the two numbers do not contain any leading zero, except the number 0 itself.",
                    examples: [
                        {input: "l1 = [2,4,3], l2 = [5,6,4]", output: "[7,0,8]"},
                        {input: "l1 = [0], l2 = [0]", output: "[0]"},
                        {input: "l1 = [9,9,9,9,9,9,9], l2 = [9,9,9,9]", output: "[8,9,9,9,0,0,0,1]"}
                    ]
                },
                {
                    id: 10,
                    title: "4Sum",
                    question: "Given an array nums of n integers, return an array of all the unique quadruplets [nums[a], nums[b], nums[c], nums[d]] such that:\n\n0 <= a, b, c, d < n\na, b, c, d are distinct.\nnums[a] + nums[b] + nums[c] + nums[d] == target\n\nYou may return the answer in any order.",
                    examples: [
                        {input: "nums = [1,0,-1,0,-2,2], target = 0", output: "[[-2,-1,1,2],[-2,0,0,2],[-1,0,0,1]]"},
                        {input: "nums = [2,2,2,2,2], target = 8", output: "[[2,2,2,2]]"},
                        {input: "nums = [], target = 0", output: "[]"}
                    ]
                }
            ]
        };

        function renderQuestions(data) {
            const container = document.getElementById('questions');
            container.innerHTML = '';

            data.questions.forEach(q => {
                const accordion = document.createElement('details');
                accordion.className = 'accordion';
                if (q.id === 1) {
                    accordion.open = true;
                }

                const summary = document.createElement('summary');
                summary.textContent = `${q.id}. ${q.title}`;
                accordion.appendChild(summary);

                const content = document.createElement('div');
                content.className = 'accordion-content';

                const description = document.createElement('p');
                description.className = 'question-description';
                description.textContent = q.question;
                content.appendChild(description);

                if (q.examples && q.examples.length) {
                    const exampleBlock = document.createElement('section');
                    exampleBlock.className = 'example-block';

                    const exampleHeading = document.createElement('h3');
                    exampleHeading.textContent = 'Examples';
                    exampleBlock.appendChild(exampleHeading);

                    const list = document.createElement('ul');
                    list.className = 'example-list';

                    q.examples.forEach(ex => {
                        const item = document.createElement('li');
                        item.className = 'example-item';
                        item.innerHTML = `<strong>Input:</strong> ${ex.input}<br><strong>Output:</strong> ${ex.output}`;
                        list.appendChild(item);
                    });

                    exampleBlock.appendChild(list);
                    content.appendChild(exampleBlock);
                }

                accordion.appendChild(content);
                container.appendChild(accordion);
            });
        }

        function initTheme() {
            const themeToggle = document.getElementById('themeToggle');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const savedTheme = localStorage.getItem('theme');
            const isDark = savedTheme ? savedTheme === 'dark' : prefersDark;

            document.body.classList.toggle('dark', isDark);
            themeToggle.textContent = isDark ? 'Light mode' : 'Dark mode';

            themeToggle.addEventListener('click', () => {
                const nextTheme = document.body.classList.toggle('dark') ? 'dark' : 'light';
                localStorage.setItem('theme', nextTheme);
                themeToggle.textContent = nextTheme === 'dark' ? 'Light mode' : 'Dark mode';
            });
        }

        function loadQuestions() {
            renderQuestions(fallbackQuestions);
            initTheme();
        }

        loadQuestions();
    </script>
</body>
</html>
